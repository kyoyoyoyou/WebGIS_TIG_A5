<!DOCTYPE html> 
<html> 
<head> 
    <title>Geospatial Mashup</title> 

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style> 
        #map { 
            width: 100%; 
            height: 700px; 
        } 
    </style> 
</head> 

<body> 
    <div id="map"></div> 

    <script> 
        // --- Inisialisasi Peta ---
        var mymap = L.map('map').setView([-6.606418, 110.935682], 14);

        // --- Basemap OpenStreetMap ---
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(mymap);

        // --- Marker ---
        var marker = L.marker([-6.606418, 110.935682]).addTo(mymap);
        marker.bindPopup('<b>Jungle</b><br>Rumah Tiger');

        // --- Circle ---
        var circle = L.circle([-6.6080, 110.9370], {
            color: '#FF1493',
            fillColor: '#FFC0CB',
            fillOpacity: 0.5,
            radius: 200
        }).addTo(mymap);
        circle.bindPopup('Circle');

        // --- Polygon 1 (Area Kawasan A) ---
        var polygon1 = L.polygon([
            [-6.6045, 110.9330],
            [-6.6025, 110.9365],
            [-6.6050, 110.9385],
            [-6.6070, 110.9350]
        ], {
            color: '#2E8B58',
            fillColor: '#00FF7F',
            fillOpacity: 0.3
        }).addTo(mymap);
        polygon1.bindPopup('Square');

        // --- Polygon 2 (Bintang, dipindah ke sisi timur) ---
        var star = L.polygon([
            [-6.6065, 110.9405],
            [-6.6075, 110.9415],
            [-6.6085, 110.9405],
            [-6.6080, 110.9420],
            [-6.6090, 110.9430],
            [-6.6078, 110.9425],
            [-6.6065, 110.9430],
            [-6.6072, 110.9420]
        ], {
            color: '#FFD700',
            fillColor: '#FFFF00',
            fillOpacity: 0.7
        }).addTo(mymap);
        star.bindPopup('Star');

        // --- Polygon 3 (Trapesium, dipindah ke selatan) ---
        var trapezoid = L.polygon([
            [-6.6105, 110.9345],
            [-6.6105, 110.9380],
            [-6.6125, 110.9395],
            [-6.6125, 110.9330]
        ], {
            color: '#0000FF',
            fillColor: '#87CEFA',
            fillOpacity: 0.5
        }).addTo(mymap);
        trapezoid.bindPopup('Trapezoid');

        // --- Polyline ---
        var polyline = L.polyline([
            [-6.6035, 110.9375],
            [-6.6055, 110.9360],
            [-6.6075, 110.9370]
        ], {
            color: '#FF0000',
            weight: 3,
            opacity: 0.8
        }).addTo(mymap);
        polyline.bindPopup('Line');
    </script> 

</body> 
</html>
